<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
            background-color: #f9f9f9;
        }

        header, footer {
            text-align: center;
        }

        h1 {
            color: #333;
        }

        section {
            margin: 15px 0;
            padding: 10px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Bookmark Page</h1>
        <p>Quick links to my favorite websites</p>
        <hr>
    </header>

    <main>
        <section>
            <h2>1. Search Engine</h2>
            <a href="https://www.google.com" target="_blank" rel="noopener">Open Google</a>
        </section>

        <section>
            <h2>2. Social Media</h2>
            <a href="https://www.facebook.com" target="_blank" rel="noopener">Open Facebook</a>
        </section>

        <section>
            <h2>3. Shopping</h2>
            <a href="https://www.amazon.com" target="_blank" rel="noopener">Open Amazon</a>
        </section>

        <section>
            <h2>4. Knowledge</h2>
            <a href="https://www.wikipedia.org" target="_blank" rel="noopener">Open Wikipedia</a>
        </section>

        <section>
            <h2>5. Photo Sharing</h2>
            <a href="https://www.instagram.com" target="_blank" rel="noopener">Open Instagram</a>
        </section>

        <section>
            <h2>6. Community Forum</h2>
            <a href="https://www.reddit.com" target="_blank" rel="noopener">Open Reddit</a>
        </section>
    </main>

    <footer>
        <hr>
        <p>Created using basic HTML</p>
    </footer>

</body>
</html>
