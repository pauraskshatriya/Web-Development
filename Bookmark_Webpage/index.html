<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Webpage</title>
</head>

<body>

    <header>
        <h1>My Bookmark Page</h1>
        <p>Quick links to my favorite websites</p>
        <hr>
    </header>

    <section>
        <h2>1. Search Engine</h2>
        <a href="https://www.google.com" target="_blank">Open Google</a>
    </section>

    <section>
        <h2>2. Social Media</h2>
        <a href="https://www.facebook.com" target="_blank">Open Facebook</a>
    </section>

    <section>
        <h2>3. Shopping</h2>
        <a href="https://www.amazon.com" target="_blank">Open Amazon</a>
    </section>

    <section>
        <h2>4. Knowledge</h2>
        <a href="https://www.wikipedia.com" target="_blank">Open Wikipedia</a>
    </section>

    <section>
        <h2>5. Photo Sharing</h2>
        <a href="https://www.instagram.com" target="_blank">Open Instagram</a>
    </section>

    <section>
        <h2>6. Community Forum</h2>
        <a href="https://www.reddit.com" target="_blank">Open Reddit</a>
    </section>

    <footer>
        <hr>
        <p>Created using basic HTML</p>
    </footer>

</body>
</html>
