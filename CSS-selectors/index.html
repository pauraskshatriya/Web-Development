<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Selectors Demo</title>

<style>

/* Universal Selector */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body styling */
body{
    font-family: Arial, sans-serif;
    margin:20px;
}

/* Element Selector */
div{
    padding:10px;
    margin:10px 0;
}

/* Class Selector */
.red{
    background-color:red;
    color:white;
}

/* ID Selector */
#green{
    background-color:green;
    color:white;
}

/* Child Selector */
div > p{
    color:blue;
    background-color:lightgray;
    padding:5px;
}

/* Descendant Selector */
div article p{
    color:white;
    background-color:brown;
    padding:5px;
}

/* Link Pseudo Classes */
a:link{
    color:green;
}

a:visited{
    color:purple;
}

a:hover{
    background-color:yellow;
}

a:active{
    background-color:red;
}

/* First Child Selector */
p:first-child{
    background-color:aqua;
}

</style>
</head>

<body>

<h2>CSS Selectors Demonstration</h2>

<!-- First-child example -->
<main>
    <p>I am first</p>
    <p>I am second</p>
</main>

<!-- Class selector + child selector -->
<div class="red">
    <p>I am a direct child paragraph</p>

    <article>
        <p>I am a paragraph inside article</p>
    </article>
</div>

<!-- ID selector -->
<div id="green">
    I am another div
</div>

<br>

<!-- Link pseudo-classes -->
<a href="https://www.google.com">Go to Google</a><br>
<a href="https://www.facebook.com">Go to Facebook</a>

</body>
</html>
