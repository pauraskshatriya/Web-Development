<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refined Card Design 2.0</title>
    <style>
        :root {
            --card-radius: 20px;
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --text-main: #0f172a; /* Darker for better contrast */
            --text-muted: #475569;
            --brand-accent: #2563eb; /* Slightly darker blue for accessibility */
            --brand-light: #eff6ff;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Container Query Setup */
        .card-container {
            container-type: inline-size;
            width: 340px;
        }

        .card {
            display: block; /* Make entire card clickable */
            text-decoration: none;
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            position: relative;
            border: 1px solid rgba(0,0,0,0.04);
            /* Focus visible for accessibility */
            &:focus-visible {
                outline: 2px solid var(--brand-accent);
                outline-offset: 4px;
            }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01); /* Slightly more subtle scale */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 
                        0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: var(--brand-accent); /* Brand accent border on hover */
        }

        .card-image-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9; /* Prevents layout shift */
            overflow: hidden;
            background-color: #e2e8f0; /* Placeholder color */
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 24px;
        }

        .category {
            display: inline-block;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: var(--brand-accent);
            background: var(--brand-light);
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 12px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .card:hover .category {
            background-color: var(--brand-accent);
            color: #fff;
        }

        .card-content h3 {
            margin: 0 0 12px;
            /* Fluid typography */
            font-size: clamp(1.25rem, 4vw, 1.5rem);
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
            letter-spacing: -0.03em;
            /* Line clamp for long titles */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-content p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
            /* Line clamp for description */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <a href="#" class="card" aria-label="Read more about The Art of Polish">
            <div class="card-image-wrapper">
                <img src="card.png" alt="Abstract geometric shapes representing design polish" loading="lazy">
            </div>
            <div class="card-content">
                <span class="category">Design Refinement</span>
                <h3>The Art of Polish</h3>
                <p>We’ve introduced tight kerning on the headers, a slate-based color palette, and a "springy" hover transition to make the interface feel alive.</p>
            </div>
        </a>
    </div>

</body>
</html>
