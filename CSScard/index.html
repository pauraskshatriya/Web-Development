<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refined Card Design</title>

    <style>
        :root {
            --card-radius: 20px; /* Slightly more organic curve */
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Snappier "pop" effect */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --brand-accent: #3b82f6; /* Subtle hint of color */
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background-color: #f1f5f9; /* Slate tint feels more modern than pure grey */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 340px; 
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: #fff;
            /* Multi-layered shadow for a "floating" look */
            box-shadow: 
                0 1px 3px 0 rgba(0, 0, 0, 0.1), 
                0 1px 2px -1px rgba(0, 0, 0, 0.1);
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: pointer;
            position: relative;
        }

        /* Subtle border to define the shape on light backgrounds */
        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: var(--card-radius);
            border: 1px solid rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 210px;
            object-fit: cover; 
            display: block;
            /* Subtle zoom effect on hover */
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 24px; /* Increased padding for "luxury" feel */
        }

        /* Category Label (New Element) */
        .category {
            display: inline-block;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--brand-accent);
            margin-bottom: 8px;
        }

        .card-content h3 {
            margin: 0 0 12px;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.25;
            letter-spacing: -0.02em; /* Tighter tracking for headings */
        }

        .card-content p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <article class="card">
        <img src="card.png" alt="High-quality descriptive visual">
        <div class="card-content">
            <span class="category">Design Refinement</span>
            <h3>The Art of Polish</h3>
            <p>We’ve introduced tight kerning on the headers, a slate-based color palette, and a "springy" hover transition to make the interface feel alive.</p>
        </div>
    </article>

</body>
</html>
