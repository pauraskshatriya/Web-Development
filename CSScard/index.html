<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Card Design</title>

    <style>
        /* Modern Reset & Variable setup */
        :root {
            --card-radius: 16px; /* Slightly rounder for a modern look */
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid; /* Grid is often cleaner for centering */
            place-items: center;
            background-color: #f8f9fa; /* Slightly cooler grey */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Card container */
        .card {
            width: 320px; /* Marginally wider for better text flow */
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: #fff;
            /* Subtler, layered shadow for realism */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                        0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 
                        0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Card image */
        .card img {
            width: 100%;
            height: 200px; /* Fixed height with object-fit prevents layout shift */
            object-fit: cover; 
            display: block;
        }

        /* Card content */
        .card-content {
            padding: 20px; /* Increased breathing room */
        }

        .card-content h3 {
            margin: 0 0 10px;
            font-size: 1.25rem;
            color: #1a1a1a;
            line-height: 1.2;
        }

        .card-content p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.5; /* Better readability */
            color: #666;
        }
    </style>
</head>

<body>

    <article class="card">
        <img src="card.png" alt="Description of the card image content">
        <div class="card-content">
            <h3>Card Title</h3>
            <p>This layout uses refined spacing and improved shadows to give the design more depth and professional polish.</p>
        </div>
    </article>

</body>
</html>
