<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Filters Demo</title>

<style>

/* Universal reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body styling */
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:20px;
}

/* Container for images */
.container{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
}

/* Image styling */
img{
    width:300px;
    height:auto;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    transition:filter 0.3s ease;
}

/* Brightness filter */
.img1{
    filter:brightness(120%);
}

/* Blur filter */
.img2{
    filter:blur(2px);
}

/* Grayscale filter */
.img3{
    filter:grayscale(60%);
}

/* Remove filter on hover */
img:hover{
    filter:none;
}

</style>
</head>

<body>

<h2>CSS Filters Demonstration</h2>

<div class="container">

    <img class="img1"
    src="https://img.freepik.com/free-photo/programming-background-with-person-working-with-codes-computer_23-2150010125.jpg"
    alt="Programming Image">

    <img class="img2"
    src="https://c.ndtvimg.com/2023-09/154fgjlg_shah-rukh-khan-_625x300_23_September_23.jpg"
    alt="Shah Rukh Khan">

    <img class="img3"
    src="https://images.hindustantimes.com/img/2022/11/12/550x309/akshay_kumar_1659860706633_1668255913307_1668255913307.jpg"
    alt="Akshay Kumar">

</div>

</body>
</html>
