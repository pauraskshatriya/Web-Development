<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Filters Demo</title>

<style>

/* Universal reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body styling */
body{
    font-family: 'Segoe UI', Tahoma, sans-serif;
    text-align:center;
    padding:20px;
    background: linear-gradient(135deg, #eef2f7, #dbe6f6);
}

/* Heading */
h2{
    margin-bottom:10px;
    color:#222;
    letter-spacing:0.5px;
}

/* Subtext */
p{
    color:#555;
}

/* Container */
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:25px;
}

/* Card */
.card{
    text-align:center;
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}

/* Card hover lift */
.card:hover{
    transform:translateY(-8px);
}

/* Image styling */
img{
    width:280px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
    transition:all 0.4s ease;
}

/* Caption */
.caption{
    margin-top:10px;
    font-size:14px;
    color:#444;
    font-weight:500;
}

/* Filters */
.img1{
    filter:brightness(120%);
}

.img2{
    filter:blur(2px);
}

.img3{
    filter:grayscale(60%);
}

/* Hover effect */
img:hover{
    filter:none;
    transform:scale(1.06);
}

/* Mobile */
@media (max-width: 768px){
    img{
        width:90%;
    }
}

</style>
</head>

<body>

<h2>CSS Filters Demonstration</h2>
<p>Hover over images to remove filters</p>

<div class="container">

    <div class="card">
        <img class="img1"
        src="https://img.freepik.com/free-photo/programming-background-with-person-working-with-codes-computer_23-2150010125.jpg"
        alt="Programming Image">
        <div class="caption">Brightness Filter</div>
    </div>

    <div class="card">
        <img class="img2"
        src="https://c.ndtvimg.com/2023-09/154fgjlg_shah-rukh-khan-_625x300_23_September_23.jpg"
        alt="Shah Rukh Khan">
        <div class="caption">Blur Filter</div>
    </div>

    <div class="card">
        <img class="img3"
        src="https://images.hindustantimes.com/img/2022/11/12/550x309/akshay_kumar_1659860706633_1668255913307_1668255913307.jpg"
        alt="Akshay Kumar">
        <div class="caption">Grayscale Filter</div>
    </div>

</div>

</body>
</html>
