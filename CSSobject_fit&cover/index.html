<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Fit Refined</title>
  <style>
    :root {
      --container-width: 466px;
    }

    .container {
      max-width: var(--container-width);
      width: 100%;
      /* Calculated aspect ratio based on 466x488 */
      aspect-ratio: 466 / 488; 
      border: 2px solid #222;
      border-radius: 8px;
      overflow: hidden; /* Ensures image respects border radius */
      background-color: #f0f0f0; /* Placeholder color while loading */
    }

    .container img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <img 
      src="https://us.123rf.com/450wm/progressman/progressman1909/progressman190900115/130695651-woman-in-black-coat-walking-along-the-sea.jpg?ver=6" 
      alt="Woman in a black coat walking along the shoreline"
      loading="lazy">
  </div>

</body>
</html>
