<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Selectors Demo</title>

    <style>
        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
        }

        /* Element Selector */
        div {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }

        /* Class Selector */
        .red {
            background-color: #ff4d4d;
            color: white;
        }

        /* ID Selector */
        #green {
            background-color: #28a745;
            color: white;
        }

        /* Child Selector */
        div > p {
            color: white;
            background-color: brown;
            padding: 5px;
            border-radius: 4px;
        }

        /* Descendant Selector */
        div p {
            border: 2px dashed black;
        }

        /* Pseudo Selectors */
        a:link {
            color: green;
        }

        a:visited {
            color: purple;
        }

        a:hover {
            background-color: yellow;
            color: black;
            padding: 2px 4px;
            border-radius: 4px;
        }

        a:active {
            background-color: red;
            color: white;
        }

        /* First-child Selector */
        p:first-child {
            background-color: aqua;
            padding: 5px;
            border-radius: 4px;
        }

        /* Section Styling */
        main {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        article {
            margin-top: 10px;
        }

        .links {
            margin-top: 20px;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <h2>CSS Selectors Demonstration</h2>

    <main class="one">
        <p>I am the first paragraph (first-child selector)</p>
        <p>I am the second paragraph</p>
    </main>

    <div class="red">
        I am a div with class "red"

        <article>
            <p>I am a paragraph inside article inside div</p>
        </article>
    </div>

    <div id="green">
        I am another div with id "green"
    </div>

    <section class="links">
        <p><strong>Useful Links:</strong></p>

        <a href="https://www.google.com" target="_blank">
            Go to Google
        </a>

        <br><br>

        <a href="https://www.facebook.com" target="_blank">
            Go to Facebook
        </a>
    </section>

</body>
</html>
