
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transitions</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.container {
    background-color: antiquewhite;
    width: 100vw; /* better responsiveness */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background-color: aquamarine;
    width: 60px;   /* fixed size avoids weird scaling on small screens */
    height: 60px;
    border-radius: 8px;
    
    transition: transform 1.5s cubic-bezier(0.25, 0.8, 0.25, 1),
                background-color 0.8s ease,
                opacity 0.3s ease;

    will-change: transform;
}

/* animation state */
.translate {
    transform: translate(150px, 150px) scale(1.8);
    background-color: blue;
}

/* hover enhancement */
.container:hover .box {
    opacity: 0.85;
}

/* accessibility: reduce motion */
@media (prefers-reduced-motion: reduce) {
    .box {
        transition: none;
    }
}
</style>
</head>

<body>
<div class="container">
    <div class="box" id="box"></div>
</div>

<script>
window.addEventListener("load", () => {
    const box = document.getElementById("box");
    
    // small delay ensures smoother initial render
    setTimeout(() => {
        box.classList.add("translate");
    }, 100);
});
</script>
</body>
</html>
