<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Demo of inline and block HTML elements">
    <title>Inline vs Block Elements - HTML Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Inline vs Block Elements</h1>
        
        <section>
            <p>Hey I am a paragraph - that's a block element.</p>
            <div>I am a div - another block element</div>
        </section>

        <section>
            <a href="https://google.com" target="_blank" rel="noopener">Google</a>
            <span>I am a span and I am inline</span>
            <a href="#">Yes, I am inline too</a>
        </section>
    </main>
</body>
</html>
