<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Float & Clear</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            line-height: 1.5;
        }

        .cards{
            border: 2px solid black;
            display: flow-root;
            padding: 10px;
            max-width: 800px;
            margin: auto;
        }

        img{
            float: left;
            margin-right: 10px;
            border-radius: 6px;
        }

        .card{
            border: 2px solid red;
            padding: 10px;
            margin-bottom: 10px;
        }

        .card:nth-child(3){
            background-color: aqua;
            clear: both;
        }
    </style>
</head>

<body>
    <div class="cards">
        <img src="https://media.istockphoto.com/id/928826678/photo/two-men-relaxing-and-fishing.jpg?s=2048x2048&w=is&k=20&c=fSG5LG9kxLNzjG9_YI1bXdz3-gD7UW2e2bd9arD5Vm8=" 
             alt="Fishing scene" width="230">

        <div class="card">
            <p>
                Lorem ipsum dolor sit, amet consectetur adipisicing elit. 
                Commodi fugiat ab tenetur praesentium sequi, nisi nesciunt officiis.
            </p>
        </div>

        <div class="card">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Inventore explicabo dignissimos...
        </div>

        <div class="card">
            Card 3
        </div>
    </div>
</body>
</html>
