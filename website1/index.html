            display: flex;
            justify-content: space-between;

            margin: 0 auto;
        }

            display: flex;

            gap: 1.5rem;
        }

        .menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

            color: var(--primary);
            outline: none;
        }
